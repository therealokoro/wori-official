name: Seed Admin User
on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Seed Admin User
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://womenrightsinitiative.org/api/seed-auth")
          
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n 1)
          
          echo "Status: $STATUS"
          echo "Body: $BODY"
          
          if [ "$STATUS" = "200" ]; then
            echo "✅ Admin seeded successfully"
          elif [ "$STATUS" = "409" ]; then
            echo "⚠️ Admin already exists, skipping"
          else
            echo "❌ Seeding failed with status $STATUS"
            exit 1
          fi