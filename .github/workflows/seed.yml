name: Seed Admin User
on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Hash password
        id: hash
        run: |
          HASHED=$(node scripts/seed-admin.mjs)
          echo "hashed=$HASHED" >> $GITHUB_OUTPUT
        env:
          NUXT_ADMIN_PASS: ${{ secrets.NUXT_ADMIN_PASS }}

      - name: Seed admin user
        run: |
          NOW=$(node --input-type=module -e "console.log(Date.now())")
          USER_ID=$(node --input-type=module -e "console.log(crypto.randomUUID())")
          ACCOUNT_ID=$(node --input-type=module -e "console.log(crypto.randomUUID())")

          npx wrangler d1 execute wori --remote --command \
            "INSERT INTO user (id, name, email, email_verified, created_at, updated_at)
             VALUES ('$USER_ID', 'Administrator', '${{ secrets.NUXT_ADMIN_EMAIL }}', 1, $NOW, $NOW);"

          npx wrangler d1 execute wori --remote --command \
            "INSERT INTO account (id, account_id, provider_id, user_id, password, created_at, updated_at)
             VALUES ('$ACCOUNT_ID', '${{ secrets.NUXT_ADMIN_EMAIL }}', 'credential', '$USER_ID', '${{ steps.hash.outputs.hashed }}', $NOW, $NOW);"

          echo "✅ Admin seeded successfully"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}